# Фрагмент для merge в /opt/hermes/data/config.yaml

model:
  default: bitrix/bitrixgpt-5.5-agent
  provider: custom
  api_key: ${VIBE_KEY}
  base_url: ${VIBE_BASE_URL}
  api_mode: chat_completions

bitrix24:
  direct_messages_only: false
  bot_name: "Гефест"
  welcome_text: |-
    Привет! Я Гефест — инженер-консультант по техническим заданиям и нормативной документации (ЕСКД, ЕСПД, ОКР).

    Чем могу помочь:
    • Сформировать или доработать ТЗ по вашему техническому описанию
    • Подсказать применимый ГОСТ и проверить актуальность редакции
    • Консультации по оформлению КД и программной документации

    Как работать:
    • Для ТЗ — передайте техническое описание (можно с настройками в блоке <НАСТРОЙКИ>)
    • Для вопроса по ГОСТу — укажите тему или номер стандарта
    • В групповом чате — обращайтесь через @Гефест

    Я не выполняю операции в CRM — только ТЗ и нормативка.

platform_toolsets:
  bitrix24:
  - search
  - hermes-cli

agent:
  disabled_toolsets: []
